<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>cockpit test — first-person canopy</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'></svg>">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "/vendor/three/three.module.js",
        "three/addons/": "/vendor/three/addons/"
      }
    }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <script type="module">
    import * as THREE from 'three';
    import { Engine } from '/src/core/engine.js';
    import { createCockpit } from '/src/render/cockpit.js';

    const params = new URLSearchParams(location.search);
    const shipClass = params.get('class') || 'swift';
    const seed = Number(params.get('seed') || 1337);
    const throttleOverride = params.has('throttle') ? Number(params.get('throttle')) : null;

    const canvas = document.getElementById('game-canvas');
    const engine = new Engine(canvas);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(66, innerWidth / innerHeight, 0.08, 40000);
    scene.add(camera); // required: cockpit is a camera child

    // --- deep-space gradient dome ------------------------------------------------
    const dome = new THREE.Mesh(
      new THREE.SphereGeometry(9000, 32, 16),
      new THREE.ShaderMaterial({
        side: THREE.BackSide,
        depthWrite: false,
        uniforms: {},
        vertexShader: `
          varying vec3 vDir;
          void main() {
            vDir = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vDir;
          void main() {
            vec3 d = normalize(vDir);
            float h = d.y * 0.5 + 0.5;
            vec3 up = vec3(0.004, 0.008, 0.02);
            vec3 hor = vec3(0.02, 0.05, 0.085);
            vec3 col = mix(hor, up, smoothstep(0.35, 0.9, h));
            col += vec3(0.03, 0.12, 0.14) * exp(-abs(d.y) * 5.0);       // teal band
            float neb = pow(max(dot(d, normalize(vec3(-0.6, 0.15, -0.5))), 0.0), 3.0);
            col += vec3(0.10, 0.03, 0.12) * neb;                        // magenta nebula
            float neb2 = pow(max(dot(d, normalize(vec3(0.7, -0.1, -0.4))), 0.0), 5.0);
            col += vec3(0.02, 0.07, 0.10) * neb2;
            gl_FragColor = vec4(col, 1.0);
          }
        `,
      })
    );
    scene.add(dome);

    // --- starfield -----------------------------------------------------------------
    {
      const N = 2400;
      const pos = new Float32Array(N * 3);
      const col = new Float32Array(N * 3);
      for (let i = 0; i < N; i++) {
        const u = Math.random() * 2 - 1, a = Math.random() * Math.PI * 2;
        const s = Math.sqrt(1 - u * u), r = 5000 + Math.random() * 2500;
        pos[i * 3] = s * Math.cos(a) * r; pos[i * 3 + 1] = u * r; pos[i * 3 + 2] = s * Math.sin(a) * r;
        const w = Math.random();
        const b = 0.5 + Math.random() * 0.9;
        col[i * 3] = b * (w < 0.12 ? 1.2 : 0.9);
        col[i * 3 + 1] = b * 0.95;
        col[i * 3 + 2] = b * (w > 0.75 ? 1.25 : 1.0);
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
      const stars = new THREE.Points(geo, new THREE.PointsMaterial({
        size: 2.2, sizeAttenuation: false, vertexColors: true,
        transparent: true, opacity: 0.95, depthWrite: false,
      }));
      scene.add(stars);
    }

    // --- speed dust streaming past the canopy ---------------------------------------
    const DUST = 420;
    const dustPos = new Float32Array(DUST * 3);
    const resetDust = (i, ahead) => {
      dustPos[i * 3] = (Math.random() - 0.5) * 90;
      dustPos[i * 3 + 1] = (Math.random() - 0.5) * 60;
      dustPos[i * 3 + 2] = ahead ? -80 - Math.random() * 120 : -Math.random() * 200 + 10;
    };
    for (let i = 0; i < DUST; i++) resetDust(i, false);
    const dustGeo = new THREE.BufferGeometry();
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({
      color: new THREE.Color(1.4, 1.7, 2.0), size: 0.28, sizeAttenuation: true,
      transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending, depthWrite: false,
    }));
    dust.frustumCulled = false;
    scene.add(dust);

    // --- planet on the horizon + sun ---------------------------------------------
    const sunDir = new THREE.Vector3(0.55, 0.28, -0.79).normalize();
    {
      const planet = new THREE.Mesh(
        new THREE.SphereGeometry(950, 40, 24),
        new THREE.MeshStandardMaterial({ color: 0x41628a, roughness: 0.95, metalness: 0 })
      );
      planet.position.set(-1450, -820, -3100);
      scene.add(planet);
      const atmo = new THREE.Mesh(
        new THREE.SphereGeometry(975, 40, 24),
        new THREE.MeshBasicMaterial({
          color: new THREE.Color(0.18, 0.4, 0.6), transparent: true, opacity: 0.1,
          blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false,
        })
      );
      atmo.position.copy(planet.position);
      scene.add(atmo);

      const sunTexC = document.createElement('canvas');
      sunTexC.width = sunTexC.height = 128;
      const sctx = sunTexC.getContext('2d');
      const g = sctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      g.addColorStop(0, 'rgba(255,255,255,1)');
      g.addColorStop(0.2, 'rgba(255,240,210,0.7)');
      g.addColorStop(0.5, 'rgba(255,200,140,0.16)');
      g.addColorStop(1, 'rgba(255,180,120,0)');
      sctx.fillStyle = g;
      sctx.fillRect(0, 0, 128, 128);
      const sun = new THREE.Sprite(new THREE.SpriteMaterial({
        map: new THREE.CanvasTexture(sunTexC), blending: THREE.AdditiveBlending,
        transparent: true, depthWrite: false,
      }));
      sun.material.color.setRGB(4, 3.4, 2.6);
      sun.position.copy(sunDir).multiplyScalar(7000);
      sun.scale.setScalar(1600);
      scene.add(sun);
    }

    // --- lights ----------------------------------------------------------------------
    const key = new THREE.DirectionalLight(new THREE.Color(1.0, 0.93, 0.82), 1.9);
    key.position.copy(sunDir).multiplyScalar(100);
    scene.add(key);
    scene.add(new THREE.HemisphereLight(0x27394d, 0x0b0a10, 0.5));

    // --- the cockpit --------------------------------------------------------------------
    const cockpit = createCockpit(shipClass, seed);
    camera.add(cockpit.group);

    engine.setScene(scene, camera, { bloomStrength: 0.7, bloomRadius: 0.55, bloomThreshold: 0.85 });
    engine.setExposure(1.1);

    let t = 0, ready = false;
    function frame() {
      const dt = engine.tick();
      t += dt;

      // throttle cycles 0 → 1 → 0 over 8 s (peaks at t=4, when smoke.mjs shoots)
      const throttle = throttleOverride ?? (0.5 - 0.5 * Math.cos(t * Math.PI / 4));
      const boost = throttle > 0.9;
      const speed = throttle * 430;
      cockpit.update(dt, { throttle, boost, speed, agl: 500, health: 1 });

      // gentle flight drift so the frame reads against a moving background
      camera.rotation.z = Math.sin(t * 0.22) * 0.05;
      camera.rotation.y = Math.sin(t * 0.13) * 0.08;
      camera.rotation.x = Math.sin(t * 0.17) * 0.03;

      // speed dust rushes past
      const v = 14 + 320 * throttle;
      for (let i = 0; i < DUST; i++) {
        dustPos[i * 3 + 2] += v * dt;
        if (dustPos[i * 3 + 2] > 6) resetDust(i, true);
      }
      dustGeo.attributes.position.needsUpdate = true;

      engine.render();
      if (!ready) { ready = true; window.__AMS__ = { ready: true }; }
      requestAnimationFrame(frame);
    }
    frame();
  </script>
</body>
</html>
