<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>fx isolation debug</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'></svg>">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
    { "imports": { "three": "/vendor/three/three.module.js", "three/addons/": "/vendor/three/addons/" } }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <script type="module">
    import * as THREE from 'three';
    import { Engine } from '/src/core/engine.js';
    import { EffectsSystem } from '/src/render/effects.js';

    const params = new URLSearchParams(location.search);
    const age = Number(params.get('age') ?? 0.08);   // freeze explosion at this age (s)
    const mode = params.get('mode') || 'all';        // all | noflash | nosmoke | noembers

    const canvas = document.getElementById('game-canvas');
    const engine = new Engine(canvas);
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1e7);
    camera.position.set(0, 0, 60);
    camera.lookAt(0, 0, 0);

    const fx = new EffectsSystem(scene);
    if (mode === 'noflash') fx._flash = () => {};
    if (mode === 'nosmoke') fx._smoke.spawn = () => {};
    if (mode === 'noembers') fx._glow.spawn = () => {};

    fx.explosion(new THREE.Vector3(0, 0, -20), 1.2, 0x7de8ff);
    // advance to the requested age in small fixed steps, then freeze
    let acc = 0;
    while (acc < age) { fx.update(1 / 120); acc += 1 / 120; }

    let ready = false;
    function frame() {
      engine.tick();
      engine.render(); // frozen state; no further fx.update
      if (!ready) { ready = true; window.__AMS__ = { ready: true }; }
      requestAnimationFrame(frame);
    }
    engine.setScene(scene, camera, { bloomStrength: 0.55, bloomRadius: 0.6, bloomThreshold: 0.85 });
    frame();
  </script>
</body>
</html>
