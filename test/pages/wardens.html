<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>warden wanted-level showcase</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'></svg>">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #05070d; overflow: hidden; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "/vendor/three/three.module.js",
        "three/addons/": "/vendor/three/addons/"
      }
    }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <script type="module">
    import * as THREE from 'three';
    import { Engine } from '/src/core/engine.js';
    import { RNG, hash32, hashString } from '/src/core/rng.js';
    import { SimplexNoise } from '/src/core/noise.js';
    import { EffectsSystem } from '/src/render/effects.js';
    import { GroundCombat } from '/src/gameplay/combat.js';
    import { events } from '/src/core/events.js';

    const canvas = document.getElementById('game-canvas');
    const engine = new Engine(canvas);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x4a2830);
    scene.fog = new THREE.Fog(0x54303a, 90, 380);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 2000);
    camera.position.set(5.5, 2.4, 10);
    camera.lookAt(-1.5, 3.6, -5);

    // ---- mock heightfield: rolling dunes, near-flat around the lineup ------
    const tnoise = new SimplexNoise(913);
    const field = {
      seaY: -Infinity,
      height(x, z) {
        return tnoise.fbm2(x * 0.005, z * 0.005, 3) * 2.4
          + tnoise.noise2D(x * 0.03, z * 0.03) * 0.22;
      },
      normal(x, z, eps = 1) {
        const hl = this.height(x - eps, z), hr = this.height(x + eps, z);
        const hd = this.height(x, z - eps), hu = this.height(x, z + eps);
        return new THREE.Vector3(hl - hr, 2 * eps, hd - hu).normalize();
      },
      moisture() { return 0.2; },
      cellRng(cx, cz, salt) {
        return new RNG(hash32(913, cx | 0, cz | 0, hashString(String(salt))));
      },
    };

    // ---- ground mesh painted from the field (dusk-dust palette) -----------
    const GSIZE = 420, GSEG = 160;
    const ggeom = new THREE.PlaneGeometry(GSIZE, GSIZE, GSEG, GSEG);
    ggeom.rotateX(-Math.PI / 2);
    {
      const pos = ggeom.attributes.position;
      const colors = new Float32Array(pos.count * 3);
      const c = new THREE.Color(), lo = new THREE.Color(0x4a3226), hi = new THREE.Color(0x7a5a3c);
      const rock = new THREE.Color(0x3c3033);
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i), z = pos.getZ(i);
        const h = field.height(x, z);
        pos.setY(i, h);
        c.copy(lo).lerp(hi, Math.min(1, Math.max(0, (h + 3.5) / 7)));
        if (tnoise.noise2D(x * 0.04 + 3, z * 0.04 - 7) > 0.4) c.lerp(rock, 0.45);
        colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
      }
      ggeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      ggeom.computeVertexNormals();
    }
    const ground = new THREE.Mesh(ggeom, new THREE.MeshStandardMaterial({
      vertexColors: true, roughness: 0.96, metalness: 0,
    }));
    ground.receiveShadow = true;
    scene.add(ground);

    // ---- warm dusk light: low amber key, violet rim, ember horizon ---------
    const key = new THREE.DirectionalLight(0xffbf85, 4.4);
    key.position.set(-26, 22, 44);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.left = -35; key.shadow.camera.right = 35;
    key.shadow.camera.top = 35; key.shadow.camera.bottom = -35;
    key.shadow.camera.far = 140;
    key.shadow.bias = -0.0005;
    key.target.position.set(0, 0, -14);
    scene.add(key, key.target);

    const rim = new THREE.DirectionalLight(0x8d7bff, 1.4);
    rim.position.set(28, 10, -36);
    scene.add(rim);
    scene.add(new THREE.HemisphereLight(0x8a5f74, 0x3a2418, 1.15));

    // sun ball sunk into the haze on the horizon (HDR emissive feeds bloom)
    const sunBall = new THREE.Mesh(
      new THREE.SphereGeometry(11, 24, 16),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(3.4, 1.5, 0.6), fog: false }),
    );
    sunBall.position.set(-290, 9, -170);
    scene.add(sunBall);

    // sparse early stars
    {
      const srng = new RNG(31);
      const n = 700, sp = new Float32Array(n * 3);
      for (let i = 0; i < n; i++) {
        const v = new THREE.Vector3(srng.gaussian(), Math.abs(srng.gaussian()) * 0.6 + 0.1, srng.gaussian())
          .normalize().multiplyScalar(900);
        sp.set([v.x, v.y, v.z], i * 3);
      }
      const sg = new THREE.BufferGeometry();
      sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
      scene.add(new THREE.Points(sg, new THREE.PointsMaterial({
        color: 0xc7a8dd, size: 1.5, sizeAttenuation: false, fog: false,
      })));
    }

    // ---- combat system on mocks (contract shapes from surfacestate) --------
    const effects = new EffectsSystem(scene);
    const player = {                       // mock PlayerController
      position: new THREE.Vector3(-6, field.height(-6, 38) + 1.1, 38),
      velocity: new THREE.Vector3(),
    };
    const def = {
      seed: 4242, crystalDensity: 0.9, hasRuins: true,
      hazard: { rad: 0.2 }, gravity: 1,
    };
    const surface = {
      def, field, player,
      survival: { applyDamage() {} },      // mock Survival
      _elapsed: 0,
    };
    const gs = { tool: { mode: 'bolt' }, upgrades: {}, addItem() {}, addLumens() {} };
    const combat = new GroundCombat(scene, effects, gs, surface);
    combat.suppressFire = true;

    // exercise the wanted-level event contract
    let lastWanted = null;
    events.on('combat:wanted', (p) => { lastWanted = p; });

    // ---- scripted showcase --------------------------------------------------
    // drones hold as an 'alert' lineup facing the player point behind camera
    const s1 = combat._spawnUnit('scout', -12, -7.5, 'alert');
    const s2 = combat._spawnUnit('scout', -16, -18, 'alert');
    const aegis = combat._spawnUnit('aegis', 3.2, -10, 'alert');
    const lancer = combat._spawnUnit('lancer', 8.5, -7, 'alert');
    // THE COLOSSUS stomps at ~12 m, angled toward the camera
    const colossus = combat._spawnUnit('colossus', -1.5, -3.5, 'hostile');

    engine.setScene(scene, camera, { bloomStrength: 0.5, bloomRadius: 0.55, bloomThreshold: 0.85 });
    engine.setExposure(1.18);

    let t = 0, tracerT = 0;
    const _from = new THREE.Vector3(), _dir = new THREE.Vector3(), _right = new THREE.Vector3();
    const _v = new THREE.Vector3();
    function frame() {
      const dt = engine.tick();
      t += dt;
      surface._elapsed = t;
      combat.update(dt, camera, player);
      // keep the Aegis hex-shield mid-blink so it reads in any single frame
      aegis.shieldFlash = Math.max(aegis.shieldFlash, 0.35 + 0.2 * Math.sin(t * 5));
      // hold the sim's own volley so the scripted lane is the only red fire
      colossus.fireT = Math.max(colossus.fireT, 3);
      // scripted heavy volley on a fixed deep lane — red bolts always in flight
      tracerT -= dt;
      if (tracerT <= 0) {
        tracerT = 0.18;
        colossus.obj.eye.getWorldPosition(_from);
        _dir.set(-30, 2.5, 8).sub(_from).normalize();
        _right.set(_dir.z, 0, -_dir.x).normalize();
        for (const s of [-0.18, 0, 0.18]) {
          effects.laserBolt(_v.copy(_from).addScaledVector(_right, s), _dir, 26, s === 0 ? '#ff2418' : '#ff5a30');
        }
      }
      effects.update(dt);
      engine.render();
      if (!window.__AMS__) {
        window.__AMS__ = {
          ready: true,
          units: combat.wardens.map((w) => w.type),
          wanted: () => lastWanted,
          t: () => t,
          bolts: () => combat.hostileBolts.filter((b) => b.handle.alive).length,
          vfxBolts: () => effects._bolts.filter((s) => s.handle.alive).length,
          colossus: () => ({ fireT: colossus.fireT, volley: colossus.volley, pos: colossus.obj.group.position.toArray() }),
        };
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
