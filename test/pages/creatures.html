<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>creatures bestiary test</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'></svg>">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #05070d; overflow: hidden; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "/vendor/three/three.module.js",
        "three/addons/": "/vendor/three/addons/"
      }
    }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <script type="module">
    import * as THREE from 'three';
    import { Engine } from '/src/core/engine.js';
    import { RNG, hash32, hashString } from '/src/core/rng.js';
    import { SimplexNoise } from '/src/core/noise.js';
    import { buildCreature } from '/src/render/creature.js';
    import { CreatureSystem } from '/src/gameplay/creatures.js';

    const canvas = document.getElementById('game-canvas');
    const engine = new Engine(canvas);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1220);
    scene.fog = new THREE.Fog(0x101a2c, 60, 220);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 2000);
    camera.position.set(0, 3.3, 13.5);
    camera.lookAt(0, 1.5, -2);

    // ---- mock TerrainField (contract shape from ARCHITECTURE.md) ----------
    const tnoise = new SimplexNoise(4242);
    const field = {
      seaY: -Infinity,
      height(x, z) {
        return tnoise.fbm2(x * 0.006, z * 0.006, 4) * 2.2
          + tnoise.noise2D(x * 0.04, z * 0.04) * 0.18;
      },
      normal(x, z, eps = 1) {
        const hl = this.height(x - eps, z), hr = this.height(x + eps, z);
        const hd = this.height(x, z - eps), hu = this.height(x, z + eps);
        return new THREE.Vector3(hl - hr, 2 * eps, hd - hu).normalize();
      },
      moisture() { return 0.5; },
      cellRng(cx, cz, salt) {
        return new RNG(hash32(9001, cx | 0, cz | 0, hashString(String(salt))));
      },
    };

    // ---- ground mesh painted from the same heightfield --------------------
    const GSIZE = 320, GSEG = 150;
    const ggeom = new THREE.PlaneGeometry(GSIZE, GSIZE, GSEG, GSEG);
    ggeom.rotateX(-Math.PI / 2);
    {
      const pos = ggeom.attributes.position;
      const colors = new Float32Array(pos.count * 3);
      const c = new THREE.Color(), lo = new THREE.Color(0x2a3d2a), hi = new THREE.Color(0x5d6b4a);
      const dry = new THREE.Color(0x54503c);
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i), z = pos.getZ(i);
        const h = field.height(x, z);
        pos.setY(i, h);
        const t = Math.min(1, Math.max(0, (h + 4) / 9));
        c.copy(lo).lerp(hi, t);
        const n = tnoise.noise2D(x * 0.03 + 9, z * 0.03 - 4);
        if (n > 0.35) c.lerp(dry, 0.5);
        colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
      }
      ggeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      ggeom.computeVertexNormals();
    }
    const ground = new THREE.Mesh(ggeom, new THREE.MeshStandardMaterial({
      vertexColors: true, roughness: 0.95, metalness: 0,
    }));
    ground.receiveShadow = true;
    scene.add(ground);

    // ---- lighting: warm key + cool fill + rim ----------------------------
    const key = new THREE.DirectionalLight(0xffd9a6, 3.4);
    key.position.set(18, 22, 14);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.left = -25; key.shadow.camera.right = 25;
    key.shadow.camera.top = 25; key.shadow.camera.bottom = -25;
    key.shadow.camera.far = 80;
    key.shadow.bias = -0.0005;
    scene.add(key, key.target);
    key.target.position.set(0, 0, 0);

    const rim = new THREE.DirectionalLight(0x7da8ff, 1.3);
    rim.position.set(-14, 8, -20);
    scene.add(rim);

    scene.add(new THREE.HemisphereLight(0x46648f, 0x32261a, 0.75));

    // low sun glow ball on the horizon for mood (HDR emissive feeds bloom)
    const sunBall = new THREE.Mesh(
      new THREE.SphereGeometry(6, 24, 16),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(3.2, 1.9, 0.9), fog: false }),
    );
    sunBall.position.set(120, 14, -160);
    scene.add(sunBall);

    // sparse night stars
    {
      const srng = new RNG(7);
      const n = 900, sp = new Float32Array(n * 3);
      for (let i = 0; i < n; i++) {
        const v = new THREE.Vector3(srng.gaussian(), Math.abs(srng.gaussian()) * 0.7 + 0.08, srng.gaussian())
          .normalize().multiplyScalar(900);
        sp.set([v.x, v.y, v.z], i * 3);
      }
      const sg = new THREE.BufferGeometry();
      sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
      scene.add(new THREE.Points(sg, new THREE.PointsMaterial({
        color: 0x9fb8dd, size: 1.6, sizeAttenuation: false, fog: false,
      })));
    }

    // ---- bestiary lineup: 8 diverse creatures ----------------------------
    // front row: small beasts close to camera; back row: the big silhouettes
    const lineup = [
      { seed: 214, biome: 'desert',   type: 'hopper',    size: 1.1, speed01: 0.9,  x: -6.6, z: 3.0 },
      { seed: 333, biome: 'crystal',  type: 'hexapod',   size: 1.0, speed01: 0.6,  x: -2.3, z: 3.4 },
      { seed: 661, biome: 'frozen',   type: 'flyer',     size: 1.9, speed01: 0.95, x:  2.0, z: 2.2, hover: 2.4 },
      { seed: 893, biome: 'exotic',   type: 'hexapod',   size: 1.2, speed01: 0.5,  x:  6.2, z: 3.2 },
      { seed: 101, biome: 'lush',     type: 'quadruped', size: 2.4, speed01: 0.75, x: -8.2, z: -3.6 },
      { seed: 447, biome: 'volcanic', type: 'serpent',   size: 4.2, speed01: 0.8,  x: -2.6, z: -4.4 },
      { seed: 555, biome: 'toxic',    type: 'floater',   size: 3.2, speed01: 0.4,  x:  2.6, z: -4.8, hover: 1.4 },
      { seed: 787, biome: 'swamp',    type: 'quadruped', size: 3.6, speed01: 0.3,  x:  7.6, z: -4.0 },
    ];
    const beasts = [];
    for (let i = 0; i < lineup.length; i++) {
      const spec = lineup[i];
      const b = buildCreature(spec.seed, spec.biome, { forceType: spec.type, forceSize: spec.size });
      const y = field.height(spec.x, spec.z);
      b.group.position.set(spec.x, y + (spec.hover || 0), spec.z);
      b.group.rotation.y = (spec.x / 18) + (i % 2 ? 0.24 : -0.18); // face camera-ish
      scene.add(b.group);
      beasts.push({ b, speed01: spec.speed01 });
    }

    // ---- live CreatureSystem in the midground (contract exercise) --------
    const planetDef = { seed: 777, biome: 'lush', faunaDensity: 0.9 };
    const system = new CreatureSystem(scene, planetDef, field);
    const playerPos = new THREE.Vector3(-20, 0, -50);

    engine.setScene(scene, camera, { bloomStrength: 0.5, bloomRadius: 0.55, bloomThreshold: 0.85 });
    engine.setExposure(1.05);

    let announced = false;
    function frame() {
      const dt = engine.tick();
      for (const { b, speed01 } of beasts) b.animate(dt, speed01);
      system.update(dt, playerPos);
      engine.render();
      if (!announced) {
        announced = true;
        const scan = system.scanNearest(playerPos, 400); // exercise the contract
        window.__AMS__ = { ready: true, scan: scan ? scan.name : null };
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
