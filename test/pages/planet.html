<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>planet — from-space visual stack test</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#129680;</text></svg>">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "/vendor/three/three.module.js",
        "three/addons/": "/vendor/three/addons/"
      }
    }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <script type="module">
    import * as THREE from 'three';
    import { Engine } from '/src/core/engine.js';
    import { createPlanetVisual } from '/src/render/planetmesh.js';
    import { createStarfield } from '/src/render/starfield.js';
    import { createSun } from '/src/render/sun.js';

    const canvas = document.getElementById('game-canvas');
    const engine = new Engine(canvas);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.5, 4e6);

    const SEED = Number(new URLSearchParams(location.search).get('seed')) || 1337;

    // backdrop
    const starfield = createStarfield(SEED);
    scene.add(starfield.object3d);

    // --- sample PlanetDefs (contract shapes from ARCHITECTURE.md) ------------
    const lushDef = {
      id: 'demo:lush', seed: 90210, name: 'Veridia', biome: 'lush', radius: 58,
      orbitRadius: 0, orbitPhase: 0, orbitSpeed: 0,
      axialTilt: 0.42, dayLength: 640, gravity: 1.0, seaLevel: 0.34,
      atmosphere: { density: 0.85, colorHex: '#6fb7ff', skyColorHex: '#7ec4ff', fogColorHex: '#9fd0ff' },
      clouds: { coverage: 0.5, colorHex: '#ffffff' },
      rings: { innerR: 84, outerR: 138, colorHex: '#cfc0a4', opacity: 0.9 },
      hazard: { heat: 0, cold: 0.05, toxic: 0, rad: 0 },
      weather: 'clear',
      palette: {
        deepWater: '#0a2c5e', shallowWater: '#1f6fae', shore: '#d9c68c',
        low: '#41904d', mid: '#2e6d39', high: '#70684f', peak: '#eceef0',
        cliff: '#5a5148', accent: '#8fd06a', glow: '#ffd88a',
      },
      resources: ['carbyne'], floraDensity: 0.8, faunaDensity: 0.6, crystalDensity: 0.1,
      hasRuins: true, hasOutpost: false,
      terrain: { relief: 0.6, roughness: 0.55, warp: 0.6, plateau: 0, crater: 0, canyon: 0 },
    };

    const volcanicDef = {
      id: 'demo:volcanic', seed: 40417, name: 'Cindral', biome: 'volcanic', radius: 52,
      orbitRadius: 0, orbitPhase: 0, orbitSpeed: 0,
      axialTilt: -0.14, dayLength: 480, gravity: 1.3, seaLevel: 0,
      atmosphere: { density: 0.45, colorHex: '#ff7a38', skyColorHex: '#7a2c14', fogColorHex: '#4a1c10' },
      clouds: { coverage: 0.22, colorHex: '#4c4145' },
      rings: null,
      hazard: { heat: 0.95, cold: 0, toxic: 0.2, rad: 0.1 },
      weather: 'ashfall',
      palette: {
        deepWater: '#160a07', shallowWater: '#2e130a', shore: '#241614',
        low: '#221a19', mid: '#372923', high: '#4a3a30', peak: '#645850',
        cliff: '#140e11', accent: '#ff5a22', glow: '#ff9c3c',
      },
      resources: ['solanite'], floraDensity: 0, faunaDensity: 0.05, crystalDensity: 0.3,
      hasRuins: false, hasOutpost: false,
      terrain: { relief: 0.85, roughness: 0.8, warp: 0.45, plateau: 0, crater: 0.3, canyon: 0.2 },
    };

    const frozenDef = {
      id: 'demo:frozen', seed: 77123, name: 'Palewake', biome: 'frozen', radius: 55,
      orbitRadius: 0, orbitPhase: 0, orbitSpeed: 0,
      axialTilt: 0.2, dayLength: 900, gravity: 0.8, seaLevel: 0.28,
      atmosphere: { density: 0.55, colorHex: '#9fd4ff', skyColorHex: '#bfe4ff', fogColorHex: '#dceeff' },
      clouds: { coverage: 0.38, colorHex: '#eef6ff' },
      rings: null,
      hazard: { heat: 0, cold: 0.95, toxic: 0, rad: 0 },
      weather: 'snow',
      palette: {
        deepWater: '#0c2f55', shallowWater: '#2b7099', shore: '#b8ccd8',
        low: '#c7dde9', mid: '#e2eef5', high: '#f2f9fd', peak: '#ffffff',
        cliff: '#6c7f8f', accent: '#9fd4ff', glow: '#bfe8ff',
      },
      resources: ['cryostal'], floraDensity: 0.1, faunaDensity: 0.2, crystalDensity: 0.5,
      hasRuins: false, hasOutpost: true,
      terrain: { relief: 0.5, roughness: 0.6, warp: 0.5, plateau: 0.2, crater: 0.1, canyon: 0 },
    };

    // --- layout ---------------------------------------------------------------
    const sunPos = new THREE.Vector3(-2400, 520, 520);
    const sunColor = 0xffe9c4;

    const planets = [
      { vis: createPlanetVisual(lushDef, { sunColor }), pos: new THREE.Vector3(-172, 20, 60) },
      { vis: createPlanetVisual(volcanicDef, { sunColor }), pos: new THREE.Vector3(38, -28, -70) },
      { vis: createPlanetVisual(frozenDef, { sunColor }), pos: new THREE.Vector3(226, 34, -170) },
    ];
    for (const p of planets) {
      p.vis.group.position.copy(p.pos);
      scene.add(p.vis.group);
    }
    // pitch the ringed planet so the ring plane reads as an ellipse
    planets[0].vis.group.rotation.x = 0.38;

    // HDR sun just off-frame left; its corona glow bleeds into the composition
    const sun = createSun({ class: 'G', colorHex: sunColor, radius: 170, temperature: 5700 });
    sun.object3d.position.copy(sunPos);
    sun.light.position.copy(sunPos);
    scene.add(sun.object3d, sun.light);

    camera.position.set(0, 10, 430);
    camera.lookAt(20, 4, -40);

    engine.setScene(scene, camera, { bloomStrength: 0.65, bloomRadius: 0.55, bloomThreshold: 0.85 });
    engine.setExposure(1.1);

    const tmpSunDir = new THREE.Vector3();
    const tmpWorld = new THREE.Vector3();
    let ready = false;
    function frame() {
      const dt = engine.tick();
      starfield.update(dt, camera.quaternion);
      sun.update(dt, camera.position);
      for (const p of planets) {
        p.vis.group.getWorldPosition(tmpWorld);
        tmpSunDir.copy(sunPos).sub(tmpWorld).normalize();
        p.vis.update(dt, camera.position, tmpSunDir);
      }
      engine.render();
      if (!ready) { ready = true; window.__AMS__ = { ready: true }; }
      requestAnimationFrame(frame);
    }
    frame();
  </script>
</body>
</html>
