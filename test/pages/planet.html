<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>planet-sphere — seamless orbit-to-surface descent</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127757;</text></svg>">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }
    #hud { position: fixed; left: 10px; top: 8px; font: 12px/1.4 monospace; color: #9fe; text-shadow: 0 0 4px #000; pointer-events: none; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "/vendor/three/three.module.js",
        "three/addons/": "/vendor/three/addons/"
      }
    }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="hud"></div>
  <script type="module">
    import * as THREE from 'three';
    import { Engine } from '/src/core/engine.js';
    import { PlanetSphere } from '/src/render/planetsphere.js';

    const canvas = document.getElementById('game-canvas');
    const hud = document.getElementById('hud');
    const engine = new Engine(canvas);                 // HDR / ACES / bloom pipeline
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x01030a);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 1, 3e5);

    const SEED = Number(new URLSearchParams(location.search).get('seed')) || 20260704;
    const RADIUS = 4000;

    // --- lighting -------------------------------------------------------------
    // A directional sun (direction only matters) + soft fills. Because the sun
    // is directional it stays consistent under the floating-origin rebase.
    const sunDirWorld = new THREE.Vector3(0.55, 0.42, 0.72).normalize();
    const sun = new THREE.DirectionalLight(0xfff1dc, 2.6);
    sun.position.copy(sunDirWorld).multiplyScalar(1e5);
    scene.add(sun);
    scene.add(new THREE.HemisphereLight(0x2a4a78, 0x0a0a12, 0.45));
    scene.add(new THREE.AmbientLight(0x20303f, 0.35));

    // --- starfield backdrop (self-contained) ----------------------------------
    (function stars() {
      const N = 1800, p = new Float32Array(N * 3);
      let s = 987654321 >>> 0;
      const rnd = () => (((s = (Math.imul(s ^ (s >>> 15), 0x2c1b3c6d)) >>> 0)) / 4294967296);
      for (let i = 0; i < N; i++) {
        const u = rnd() * 2 - 1, a = rnd() * Math.PI * 2, r = 1.2e5;
        const sr = Math.sqrt(1 - u * u);
        p[i * 3] = Math.cos(a) * sr * r; p[i * 3 + 1] = u * r; p[i * 3 + 2] = Math.sin(a) * sr * r;
      }
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(p, 3));
      const m = new THREE.PointsMaterial({ color: 0xffffff, size: 260, sizeAttenuation: true });
      scene.add(new THREE.Points(g, m));
    })();

    // --- the planet -----------------------------------------------------------
    const planet = new PlanetSphere(scene, { seed: SEED, radius: RADIUS, seaLevel: RADIUS });
    planet.setSunDirection(sunDirWorld);

    engine.setScene(scene, camera, {
      bloomStrength: 0.6, bloomRadius: 0.6, bloomThreshold: 0.9,
      aoEnabled: false, godrayEnabled: false,
    });
    engine.setExposure(1.0);

    // --- scripted descent -----------------------------------------------------
    // camDir = fixed viewing direction from planet centre outward (off the sun
    // and off the poles so the terminator and lighting read well). Altitude
    // eases from far orbit (well outside the 1.035R atmosphere shell) down to a
    // few units above the local terrain. Camera stays at the world origin; the
    // planet is rebased under it (floating origin).
    const worldUp = new THREE.Vector3(0, 1, 0);
    const ALT_FAR = RADIUS * 6.0;   // 24000 u : orbit, whole planet in view
    const ALT_NEAR = 32;            // just above the surface
    const DURATION = 15;            // seconds for the full auto descent

    // Pick a descent target: a sun-lit, non-polar, colourful mid-elevation
    // (below the snow line) land point that is locally RUGGED — so the surface
    // shot lands amid relief with grass/rock colour, not a blown-out snow peak.
    const camDir = (function pickTarget() {
      const best = new THREE.Vector3(0.38, 0.26, 0.90).normalize();
      let bestScore = -1e9, s = 0x1234abcd >>> 0;
      const rnd = () => ((s = (Math.imul(s ^ (s >>> 15), 0x2c1b3c6d)) >>> 0) / 4294967296);
      const d = new THREE.Vector3(), t1 = new THREE.Vector3(), t2 = new THREE.Vector3(), nb = new THREE.Vector3();
      for (let i = 0; i < 800; i++) {
        const u = rnd() * 2 - 1, a = rnd() * Math.PI * 2, sr = Math.sqrt(1 - u * u);
        d.set(Math.cos(a) * sr, u, Math.sin(a) * sr);
        if (Math.abs(d.y) > 0.5) continue;                 // off the poles
        if (d.dot(sunDirWorld) < 0.25) continue;           // sun-lit side
        const alt = planet.heightAt(d) - RADIUS;
        if (alt < 25 || alt > 135) continue;               // colourful land, below snow
        t1.set(0, 1, 0).cross(d).normalize(); t2.copy(d).cross(t1);
        let rug = 0;                                        // local relief energy
        for (let n = 0; n < 6; n++) {
          const ang = n / 6 * Math.PI * 2;
          nb.copy(d).addScaledVector(t1, Math.cos(ang) * 0.012).addScaledVector(t2, Math.sin(ang) * 0.012).normalize();
          rug += Math.abs((planet.heightAt(nb) - RADIUS) - alt);
        }
        const score = rug * 2 - Math.abs(alt - 85);
        if (score > bestScore) { bestScore = score; best.copy(d); }
      }
      return best.normalize();
    })();

    const smoothstep = (a, b, x) => { const t = Math.min(1, Math.max(0, (x - a) / (b - a))); return t * t * (3 - 2 * t); };

    const _camPos = new THREE.Vector3();
    const _tan = new THREE.Vector3();
    const _look = new THREE.Vector3();
    const _up = new THREE.Vector3();

    let manual = false, tState = 0;

    function applyT(t) {
      t = Math.min(1, Math.max(0, t));
      tState = t;
      const groundR = planet.heightAt(camDir);
      const alt = ALT_NEAR + (ALT_FAR - ALT_NEAR) * Math.pow(1 - t, 3);
      const dist = groundR + alt;
      _camPos.copy(camDir).multiplyScalar(dist);      // universe-space camera pos

      planet.update(1 / 60, _camPos);                  // rebase + LOD
      planet.setSunDirection(sunDirWorld);

      // Aim by blending the VIEW DIRECTION (camera-relative), which keeps the
      // planet in frame at every altitude. Orbit -> look at the planet centre;
      // surface -> look mostly along the horizontal tangent, dipped ~12 deg so
      // foreground terrain fills the lower frame and the curved limb reads.
      const nearness = 1 - smoothstep(60, 2600, alt);
      const k = nearness * 0.82;
      _look.copy(_camPos).multiplyScalar(-1).normalize();  // unit dir toward planet centre
      _tan.copy(worldUp).cross(camDir).normalize();        // horizontal forward tangent
      _look.multiplyScalar(1 - k).addScaledVector(_tan, k).normalize().multiplyScalar(1000);

      // Level the horizon near the surface: blend camera "up" from world-up
      // (orbit) to the local radial (camDir) so the ground reads flat and the
      // curved limb sits horizontal.
      _up.copy(worldUp).multiplyScalar(1 - nearness).addScaledVector(camDir, nearness).normalize();

      camera.position.set(0, 0, 0);
      camera.up.copy(_up);
      camera.lookAt(_look);
      camera.updateMatrixWorld(true);

      const st = planet.getStats();
      hud.textContent =
        `t=${t.toFixed(3)}  alt=${alt.toFixed(0)}u  dist=${dist.toFixed(0)}u\n` +
        `leaves=${st.leaves}  tris=${st.triangles | 0}  builds=${st.builds}`;
    }

    function renderFrame() { engine.render(); }

    // --- loop -----------------------------------------------------------------
    let start = performance.now();
    let ready = false;
    function frame() {
      engine.tick();
      if (!manual) {
        const t = Math.min(1, (performance.now() - start) / 1000 / DURATION);
        applyT(t);
      }
      renderFrame();
      if (!ready) {
        ready = true;
        window.__AMS__ = { ready: true };
        console.log('[planet] ready — seamless cube-sphere planet, radius', RADIUS,
          '| drive window.__PLANET__.setT(0..1)');
      }
      requestAnimationFrame(frame);
    }

    // --- test hook ------------------------------------------------------------
    window.__PLANET__ = {
      planet, camera, engine,
      get t() { return tState; },
      setT(fraction) { manual = true; applyT(fraction); renderFrame(); },
      play() { manual = false; start = performance.now(); },
    };

    applyT(0);       // start at orbit so the very first frame is a round planet
    frame();
  </script>
</body>
</html>
